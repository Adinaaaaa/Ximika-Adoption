name: Daily Cat Scrape

on:
  schedule:
    # 8 AM Toronto (EST/EDT) — 13:00 UTC during EST, adjust for DST as needed
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w @cat-matcher/shared

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: scrapers

      - name: Run scrapers
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESCUEGROUPS_API_KEY: ${{ secrets.RESCUEGROUPS_API_KEY }}
          SCRAPE_POSTAL_CODE: M5S2M6
          SCRAPE_MAX_DISTANCE_KM: 130
        run: npm run scrape -w scrapers
